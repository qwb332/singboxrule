      - 🎯 全球直连

  - name: 🐠 漏网之鱼
    type: select
    proxies:
      - 🚀 默认代理
      - 🎯 全球直连
      - 🇺🇲 美国手动
      - 🇭🇰 香港手动
      - 🇹🇼 台湾手动
      - 🇯🇵 日本手动
      - 🇸🇬 狮城手动

  - name: 📥 Download
    type: select
    include-all: true
    proxies:
      - 🎯 全球直连

  - name: 💰 Bybit
    type: select
    include-all: true
    proxies:
      - 🎯 全球直连

  - name: 🔞 KRAV
    type: select
    include-all: true
    proxies:
      - 🎯 全球直连

  - name: 🌎 Wechat
    type: select
    include-all: true
    proxies:
      - 🎯 全球直连

  - name: 🇺🇲 美国手动
    type: select
    include-all: true
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置
    filter: (?i)美国|USA|US|🇺🇸

  - name: 🇭🇰 香港手动
    type: select
    include-all: true
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置
    filter: (?i)香港|Hong Kong|HK|🇭🇰

  - name: 🇹🇼 台湾手动
    type: select
    include-all: true
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置
    filter: (?i)台湾|Taiwan|TW|🇹🇼

  - name: 🇯🇵 日本手动
    type: select
    include-all: true
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置
    filter: (?i)日本|Japan|JP|🇯🇵

  - name: 🇸🇬 狮城手动
    type: select
    include-all: true
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置
    filter: (?i)新加坡|Singapore|SG|🇸🇬

  - name: 🐸 手动选择
    type: select
    include-all: true
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置

  - name: ♻️ 自动选择
    type: url-test
    include-all: true
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置
    interval: 300

  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT

