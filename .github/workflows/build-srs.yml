name: Sync and Compile Sing-Box Rules

on:
  push:
    branches:
      - main # 🌟 对应您的仓库默认主分支 main
    paths:
      - 'config/singbox/rules/*.json' # 🌟 当你在该目录下添加或修改任何 json 规则时触发
  schedule:
    - cron: '0 15 * * *' # 每天北京时间 23:00 定时执行一次
  workflow_dispatch: # 允许手动点按钮触发

permissions:
  contents: write

jobs:
  sync_and_compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Download and Merge rules
        run: |
          python scripts/merge_rules.py

      - name: Get the latest Sing-Box version
        id: version
        run: |
          # 🌟 动态获取 SagerNet 官方最新的稳定版内核版本号
          SING_BOX_VERSION=$(curl -sL -o /dev/null -w "%{url_effective}\n" https://github.com/SagerNet/sing-box/releases/latest | grep -oP 'tag/\K[^/]+')
          SING_BOX_VERSION=${SING_BOX_VERSION#v}
          echo "SING_BOX_VERSION=$SING_BOX_VERSION" >> $GITHUB_ENV

      - name: Install sing-box
        run: |
          # 🌟 直接下载官方编译好的免编译二进制，速度极快
          curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-linux-amd64.tar.gz
          tar -xzf sing-box.tar.gz
          chmod +x sing-box-${SING_BOX_VERSION}-linux-amd64/sing-box
          sudo mv sing-box-${SING_BOX_VERSION}-linux-amd64/sing-box /usr/local/bin/sing-box
          sing-box version

      - name: Clear old SRS and Auto Compile all JSON rules
        run: |
          TARGET_DIR="config/singbox/rules"
          
          # 先清理掉该目录下可能残存的旧二进制 .srs 文件
          find "$TARGET_DIR" -type f -name "*.srs" -exec rm -f {} \;
          
          # 🌟 核心升级：全自动遍历你的 config/singbox/rules 目录
          # 只要是 .json 文件，全自动编译成同名的 .srs 文件，以后你加任何新规则都不用改这个脚本！
          find "$TARGET_DIR" -type f -name "*.json" -exec bash -c '
            json_file="$1"
            srs_file="${json_file%.json}.srs"
            echo "Compiling: $json_file -> $srs_file"
            if ! sing-box rule-set compile --output "$srs_file" "$json_file"; then
              echo "Error compiling $json_file"
              exit 1
            fi
          ' _ {} \;

          # 清理下载的零碎压缩包，保持 workspace 干净
          rm -rf sing-box-${SING_BOX_VERSION}-linux-amd64 sing-box.tar.gz

      - name: Convert Mihomo Rules to YAML
        run: |
          python scripts/json_to_yaml.py

      - name: Commit and push compiled rule files
        run: |
          git add config/singbox/rules/
          git add config/mihomo/rules/
          
          # 🌟 检查暂存区是否有变动
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git commit -m "Automated: Sync Sing-box SRS and Mihomo YAML rules"
            git push
          fi
